<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجموعة الذيابي — عقود الإيجار</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>">
<style>
:root{--brand:#8B6914;--brand-light:#C49A2A;--bg:#F5F0E8;--surface:#FFF;--border:#E2D5B8;--text:#1A1208;--text-2:#4A3B1C;--text-3:#8B7A55;--red:#DC2626;--red-bg:#FEF2F2;--orange:#EA580C;--orange-bg:#FFF7ED;--yellow:#D97706;--yellow-bg:#FFFBEB;--green:#16A34A;--green-bg:#F0FDF4;--blue:#1D4ED8;--blue-bg:#EFF6FF;--shadow:0 2px 12px rgba(139,105,20,.1);--radius:12px;}
html[data-dark]{--bg:#0F0B05;--surface:#1A1208;--border:#3A2E16;--text:#F5EDD8;--text-2:#C9B87A;--text-3:#7A6A45;--red-bg:#3B1212;--orange-bg:#2D1800;--yellow-bg:#292000;--green-bg:#052E16;--blue-bg:#1e3a5f;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl;}
.topbar{background:linear-gradient(135deg,#1a0f02,#3d2409);padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.3);}
.topbar-brand{color:#C49A2A;font-size:16px;font-weight:800;}
.topbar-sub{color:rgba(255,255,255,.4);font-size:10px;letter-spacing:1px;}
.topbar-right{margin-right:auto;display:flex;align-items:center;gap:8px;}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;}
.conn-label{font-size:11px;color:rgba(255,255,255,.5);}
.btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.15s;}
.btn:hover{border-color:var(--brand);color:var(--brand);}
.btn-gold{background:linear-gradient(135deg,#C49A2A,#8B6914);color:#fff;border:none;}
.dark-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;}
.main{padding:24px;max-width:1400px;margin:0 auto;}
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);cursor:pointer;transition:.2s;border-top:3px solid transparent;}
.kpi:hover{transform:translateY(-2px);}
.kpi-val{font-size:24px;font-weight:800;line-height:1;}
.kpi-lbl{font-size:10px;color:var(--text-3);margin-top:4px;line-height:1.4;}
.kpi.red{border-top-color:var(--red);} .kpi.red .kpi-val{color:var(--red);}
.kpi.orange{border-top-color:var(--orange);} .kpi.orange .kpi-val{color:var(--orange);}
.kpi.yellow{border-top-color:var(--yellow);} .kpi.yellow .kpi-val{color:var(--yellow);}
.kpi.green{border-top-color:var(--green);} .kpi.green .kpi-val{color:var(--green);}
.kpi.blue{border-top-color:var(--blue);} .kpi.blue .kpi-val{color:var(--blue);}
.kpi.brand{border-top-color:var(--brand);} .kpi.brand .kpi-val{color:var(--brand);}
.alert-banner{background:linear-gradient(135deg,#FEF3C7,#FFFBEB);border:2px solid #F59E0B;border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;}
.alert-title{font-size:13px;font-weight:700;color:#D97706;margin-bottom:8px;}
.charts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
.chart-title{font-size:13px;font-weight:700;color:var(--text-2);margin-bottom:12px;}
.chart-wrap{position:relative;height:210px;}
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;box-shadow:var(--shadow);}
.fi{padding:7px 12px;border:1.5px solid var(--border);border-radius:20px;background:var(--bg);color:var(--text);font-size:12px;cursor:pointer;}
.fi:focus{outline:none;border-color:var(--brand);}
.tbl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.tbl-hdr{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.tbl-scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:1200px;}
th{padding:9px 10px;text-align:right;font-size:11px;font-weight:600;color:var(--text-3);background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:11px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(139,105,20,.04);}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap;}
.badge.منتهية{background:var(--red-bg);color:var(--red);}
.badge.تنتهي_30{background:var(--orange-bg);color:var(--orange);}
.badge.تنتهي_60{background:var(--yellow-bg);color:var(--yellow);}
.badge.تنتهي_90{background:var(--blue-bg);color:var(--blue);}
.badge.سارية{background:var(--green-bg);color:var(--green);}
.badge.بدون{background:var(--bg);color:var(--text-3);}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(3,1fr);}.charts-grid{grid-template-columns:1fr;}}
@media print{.topbar,.filter-bar,.btn,.dark-btn{display:none!important;}body{background:#fff;}@page{size:A4 landscape;margin:10mm;}}
</style>
</head>
<body>
<div class="topbar">
  <span style="font-size:22px">🏠</span>
  <div><div class="topbar-brand">مجموعة الذيابي</div><div class="topbar-sub">عقود الإيجار — السكنات</div></div>
  <div class="topbar-right">
    <span class="conn-dot" id="connDot"></span><span class="conn-label" id="connLabel">البيانات محملة</span>
    <button class="btn" onclick="refreshData()">🔄 تحديث</button>
    <button class="btn btn-gold" onclick="exportExcel()">📊 Excel</button>
    <button class="btn" onclick="window.print()">🖨️ طباعة</button>
    <button class="dark-btn" id="darkBtn" onclick="toggleDark()">🌙</button>
  </div>
</div>
<div class="main">
  <div class="kpi-grid" id="kpiGrid"></div>
  <div id="alertBanner"></div>
  <div class="charts-grid">
    <div class="chart-card"><div class="chart-title">📊 حالة العقود</div><div class="chart-wrap"><canvas id="cStatus"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">🏢 توزيع القطاعات</div><div class="chart-wrap"><canvas id="cSectors"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">💰 القيمة الإيجارية حسب القطاع</div><div class="chart-wrap"><canvas id="cValue"></canvas></div></div>
  </div>
  <div class="filter-bar">
    <input class="fi" type="text" id="srch" placeholder="🔍 بحث..." oninput="render()" style="width:180px">
    <select class="fi" id="fStatus" onchange="render()">
      <option value="">كل الحالات</option>
      <option value="منتهية">🔴 منتهية</option>
      <option value="تنتهي_30">🟠 أقل من 30 يوم</option>
      <option value="تنتهي_60">🟡 أقل من 60 يوم</option>
      <option value="تنتهي_90">🔵 أقل من 90 يوم</option>
      <option value="سارية">🟢 سارية</option>
    </select>
    <select class="fi" id="fSector" onchange="render()"><option value="">كل القطاعات</option></select>
    <select class="fi" id="fTenant" onchange="render()"><option value="">كل المستأجرين</option></select>
    <span id="cnt" style="font-size:11px;color:var(--text-3);margin-right:auto"></span>
  </div>
  <div class="tbl-card">
    <div class="tbl-hdr"><span style="font-size:13px;font-weight:700">📋 عقود الإيجار</span><span id="tblCnt" style="font-size:11px;color:var(--text-3)"></span></div>
    <div class="tbl-scroll">
      <table><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
    </div>
  </div>
</div>

  const s30 = RAW.filter(r=>r.endStatus==='تنتهي_30').length;
  const s60 = RAW.filter(r=>r.endStatus==='تنتهي_60').length;
  const valid = RAW.filter(r=>r.endStatus==='سارية').length;
  const dueSoon = RAW.filter(r=>r.dueStatus==='منتهية'||r.dueStatus==='تنتهي_30').length;
  const totalVal = RAW.reduce((s,r)=>s+(r.annualValue||0),0);
  
  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi brand"><div class="kpi-val">${RAW.length}</div><div class="kpi-lbl">📋 إجمالي العقود</div></div>
    <div class="kpi red" onclick="filterStatus('منتهية')"><div class="kpi-val">${expired}</div><div class="kpi-lbl">🔴 عقود منتهية<br><small style="opacity:.7">اضغط للتفاصيل</small></div></div>
    <div class="kpi orange" onclick="filterStatus('تنتهي_30')"><div class="kpi-val">${s30}</div><div class="kpi-lbl">🟠 تنتهي < 30 يوم</div></div>
    <div class="kpi yellow" onclick="filterStatus('تنتهي_60')"><div class="kpi-val">${s60}</div><div class="kpi-lbl">🟡 تنتهي < 60 يوم</div></div>
    <div class="kpi green" onclick="filterStatus('سارية')"><div class="kpi-val">${valid}</div><div class="kpi-lbl">🟢 سارية</div></div>
    <div class="kpi blue"><div class="kpi-val" style="font-size:14px">${totalVal.toLocaleString('ar-SA')}</div><div class="kpi-lbl">💰 إجمالي القيمة السنوية (﷼)</div></div>
  `;
}

function filterStatus(st) {
  document.getElementById('fStatus').value = st;
  render();
  document.querySelector('.tbl-card').scrollIntoView({behavior:'smooth'});
}

function renderAlerts() {
  const expired = RAW.filter(r=>r.endStatus==='منتهية');
  const s30 = RAW.filter(r=>r.endStatus==='تنتهي_30');
  const dueSoon = RAW.filter(r=>r.dueStatus==='منتهية'||r.dueStatus==='تنتهي_30');
  
  const all = [
    ...expired.map(r=>`<div style="padding:3px 0;border-bottom:1px solid rgba(245,158,11,.2)"><span style="background:#FEE2E2;color:#DC2626;padding:1px 7px;border-radius:6px;font-size:10px;font-weight:700;margin-left:6px">منتهي</span>${r.contract} — ${r.sector}</div>`),
    ...s30.map(r=>`<div style="padding:3px 0;border-bottom:1px solid rgba(245,158,11,.2)"><span style="background:#FED7AA;color:#EA580C;padding:1px 7px;border-radius:6px;font-size:10px;font-weight:700;margin-left:6px">باقي ${r.endDays} يوم</span>${r.contract} — ${r.sector}</div>`),
    ...dueSoon.map(r=>`<div style="padding:3px 0;border-bottom:1px solid rgba(245,158,11,.2)"><span style="background:#BFDBFE;color:#1D4ED8;padding:1px 7px;border-radius:6px;font-size:10px;font-weight:700;margin-left:6px">💰 استحقاق ${fmtDate(r.dueDate)}</span>${r.contract} — ${fmtMoney(r.dueAmount)}</div>`),
  ];
  
  if(all.length===0){ document.getElementById('alertBanner').innerHTML=''; return; }
  document.getElementById('alertBanner').innerHTML = `
    <div class="alert-banner">
      <div class="alert-title">⚠️ تنبيهات عقود الإيجار — ${expired.length} منتهية + ${s30.length} قريبة + ${dueSoon.length} استحقاقات</div>
      <div style="font-size:12px;color:#92400E;line-height:1.9">${all.slice(0,10).join('')}${all.length>10?`<div style="font-size:11px;opacity:.7;margin-top:4px">... و${all.length-10} أخرى</div>`:''}</div>
    </div>`;
}

function renderCharts() {
  if(typeof Chart==='undefined') return;
  if(window.ChartDataLabels) Chart.register(ChartDataLabels);
  
  const dl = { datalabels:{ display:ctx=>ctx.dataset.data[ctx.dataIndex]>0, anchor:'end', align:'end', offset:2, color:'#8B6914', font:{size:10,weight:'700'}, formatter:v=>v>0?v:'' } };
  const dlMoney = { datalabels:{ display:ctx=>ctx.dataset.data[ctx.dataIndex]>0, anchor:'end', align:'end', offset:2, color:'#8B6914', font:{size:9,weight:'700'}, formatter:v=>v>0?(v/1000).toFixed(0)+'K':'' } };

  const STATUS = ['منتهية','تنتهي_30','تنتهي_60','تنتهي_90','سارية'];
  const STATUS_COLORS = ['#DC2626','#EA580C','#D97706','#1D4ED8','#16A34A'];
  const statusCounts = STATUS.map(s=>RAW.filter(r=>r.endStatus===s).length);
  
  if(chartInst.cStatus) chartInst.cStatus.destroy();
  chartInst.cStatus = new Chart(document.getElementById('cStatus'),{
    type:'bar',
    data:{ labels:['منتهية','< 30 يوم','< 60 يوم','< 90 يوم','سارية'].filter((_,i)=>statusCounts[i]>0), datasets:[{data:statusCounts.filter(c=>c>0),backgroundColor:STATUS_COLORS.filter((_,i)=>statusCounts[i]>0),borderRadius:6,borderSkipped:false}] },
    options:{ responsive:true,maintainAspectRatio:false, plugins:{legend:{display:false},...dl}, scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(0,0,0,.06)'}}} }
  });

  // Normalize sectors
  const secMap = {};
  RAW.forEach(r=>{ const s=(r.sector||'').replace('الصيانه','الصيانة').replace('و التشغيل','والتشغيل').trim(); secMap[s]=(secMap[s]||0)+1; });
  const secSorted = Object.entries(secMap).sort((a,b)=>b[1]-a[1]);
  const COLORS = ['#8C6A38','#A07842','#C49A2A','#D4AF7A','#1D4ED8','#16A34A','#7C3AED'];
  
  if(chartInst.cSectors) chartInst.cSectors.destroy();
  chartInst.cSectors = new Chart(document.getElementById('cSectors'),{
    type:'doughnut',
    data:{ labels:secSorted.map(x=>x[0]), datasets:[{data:secSorted.map(x=>x[1]),backgroundColor:COLORS.slice(0,secSorted.length),borderWidth:2,borderColor:'var(--surface)'}] },
    options:{ responsive:true,maintainAspectRatio:false,cutout:'55%', plugins:{legend:{position:'bottom',labels:{boxWidth:8,font:{size:9},padding:4}}, datalabels:{display:ctx=>ctx.dataset.data[ctx.dataIndex]>0,color:'#fff',font:{size:10,weight:'700'},formatter:(v,ctx)=>{const t=ctx.dataset.data.reduce((a,b)=>a+b,0);return Math.round(v/t*100)+'%';}} } }
  });

  // Value by sector
  const valMap = {};
  RAW.forEach(r=>{ const s=(r.sector||'').replace('الصيانه','الصيانة').replace('و التشغيل','والتشغيل').trim(); valMap[s]=(valMap[s]||0)+(r.annualValue||0); });
  const valSorted = Object.entries(valMap).sort((a,b)=>b[1]-a[1]);
  
  if(chartInst.cValue) chartInst.cValue.destroy();
  chartInst.cValue = new Chart(document.getElementById('cValue'),{
    type:'bar',
    data:{ labels:valSorted.map(x=>x[0]), datasets:[{data:valSorted.map(x=>x[1]),backgroundColor:COLORS.slice(0,valSorted.length),borderRadius:4,borderSkipped:false}] },
    options:{ indexAxis:'y', responsive:true,maintainAspectRatio:false, plugins:{legend:{display:false},...dlMoney}, scales:{x:{grid:{color:'rgba(0,0,0,.06)'}},y:{grid:{display:false},ticks:{font:{size:9}}}} }
  });
}

function render() {
  const srch = document.getElementById('srch').value.toLowerCase();
  const fSt = document.getElementById('fStatus').value;
  const fSec = document.getElementById('fSector').value;
  const fTen = document.getElementById('fTenant').value;
  
  const filtered = RAW.filter(r=>{
    if(fSt && r.endStatus!==fSt) return false;
    if(fSec && r.sector!==fSec) return false;
    if(fTen && r.tenant!==fTen) return false;
    if(srch) { const txt = [r.contract,r.sector,r.landlord,r.tenant,r.rep,r.notes].join(' ').toLowerCase(); if(!txt.includes(srch)) return false; }
    return true;
  });
  
  document.getElementById('cnt').textContent = filtered.length + ' نتيجة';
  document.getElementById('tblCnt').textContent = filtered.length + ' عقد';
  
  document.getElementById('tHead').innerHTML = `<tr>
    <th>#</th><th>العقد</th><th>بنود إضافية</th><th>القطاع</th><th>المؤجر</th><th>المستأجر</th><th>ملاحظات العقد</th><th>الممثل</th>
    <th>القيمة السنوية</th><th>مدة العقد</th><th>بداية العقد</th><th>نهاية العقد</th><th>أيام المتبقية</th><th>حالة العقد</th>
    <th>تحمل الضريبة</th><th>طريقة الدفع</th><th>موعد الاستحقاق</th><th>أيام الاستحقاق</th><th>حالة الاستحقاق</th><th>مبلغ الاستحقاق</th>
    <th>ملاحظات</th><th>ملاحظات 2</th>
  </tr>`;
  
  document.getElementById('tBody').innerHTML = filtered.length===0
    ? `<tr><td colspan="22" style="text-align:center;padding:32px;color:var(--text-3)">لا توجد نتائج</td></tr>`
    : filtered.map(r=>`<tr>
        <td style="color:var(--text-3)">${r.no}</td>
        <td style="font-weight:600;min-width:120px">${r.contract}</td>
        <td style="color:var(--text-3)">${r.extra||'—'}</td>
        <td><span style="background:var(--yellow-bg);color:var(--yellow);padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600">${r.sector||'—'}</span></td>
        <td>${r.landlord||'—'}</td>
        <td style="color:var(--text-3)">${r.tenant||'—'}</td>
        <td style="font-size:10px;color:var(--text-3)">${r.contractNotes||'—'}</td>
        <td>${r.rep||'—'}</td>
        <td style="font-weight:600;color:var(--brand);white-space:nowrap">${fmtMoney(r.annualValue)}</td>
        <td style="color:var(--text-3)">${r.duration||'—'}</td>
        <td style="direction:ltr;text-align:right;font-size:10px">${fmtDate(r.startDate)}</td>
        <td style="direction:ltr;text-align:right;font-size:10px">${fmtDate(r.endDate)}</td>
        <td style="text-align:center">${r.endDays!==null?(r.endDays<=0?`<span style="color:var(--red);font-weight:700">منذ ${Math.abs(r.endDays)} يوم</span>`:`${r.endDays} يوم`):'—'}</td>
        <td>${badge(r.endStatus)}</td>
        <td style="font-size:10px;color:var(--text-3)">${r.taxBurden||'—'}</td>
        <td style="font-size:10px;color:var(--text-3)">${r.payMethod||'—'}</td>
        <td style="direction:ltr;text-align:right;font-size:10px">${fmtDate(r.dueDate)}</td>
        <td style="text-align:center">${r.dueDays!==null?(r.dueDays<=0?`<span style="color:var(--red);font-weight:700">منذ ${Math.abs(r.dueDays)} يوم</span>`:`${r.dueDays} يوم`):'—'}</td>
        <td>${badge(r.dueStatus)}</td>
        <td style="font-weight:600;color:var(--blue);white-space:nowrap">${fmtMoney(r.dueAmount)}</td>
        <td style="font-size:10px;color:${r.notes?'#DC2626':'var(--text-3)'};min-width:100px">${r.notes||'—'}</td>
        <td style="font-size:10px;color:var(--text-3)">${r.notes2||'—'}</td>
      </tr>`).join('');
}

function refreshData() {
  document.getElementById('connDot').style.background = '#D97706';
  document.getElementById('connLabel').textContent = 'جارٍ التحديث...';
  const proxies = [SHEET_URL,'https://api.allorigins.win/get?url='+encodeURIComponent(SHEET_URL),'https://corsproxy.io/?'+encodeURIComponent(SHEET_URL)];
  const tryP=(i)=>{
    if(i>=proxies.length){document.getElementById('connDot').style.background='#EA580C';document.getElementById('connLabel').textContent='تعذّر التحديث';return;}
    fetch(proxies[i]).then(r=>r.ok?(proxies[i].includes('allorigins')?r.json():r.text()):Promise.reject())
      .then(d=>{const txt=typeof d==='string'?d:d.contents;if(!txt)throw new Error('empty');
        parseCsvUpdate(txt);
        document.getElementById('connDot').style.background='#16A34A';
        document.getElementById('connLabel').textContent=`متصل — ${RAW.length} عقد`;
      }).catch(()=>tryP(i+1));
  };
  tryP(0);
}

function parseCsvUpdate(csv) {
  const rows=[];let cur='',inQ=false,fields=[];
  for(let i=0;i<csv.length;i++){const ch=csv[i];if(ch==='"'){if(inQ&&csv[i+1]==='"'){cur+='"';i++;}else{inQ=!inQ;}}else if(ch===','&&!inQ){fields.push(cur.trim());cur='';}else if(ch==='\n'&&!inQ){fields.push(cur.trim());cur='';rows.push(fields);fields=[];}else if(ch==='\r'){}else{cur+=ch;}}
  if(cur||fields.length){fields.push(cur.trim());rows.push(fields);}
  if(rows.length<2) return;
  const hdrs=rows[0].map(h=>h.replace(/\n/g,' ').trim());
  const g=(r,...keys)=>{for(const k of keys){const v=r[k];if(v!==undefined&&String(v).trim()!=='')return String(v).trim();}return'';}
  const parsed=rows.slice(1).map((f,i)=>{const r={};hdrs.forEach((h,j)=>{r[h]=(f[j]||'').trim();});return r;}).filter(r=>Object.values(r).some(v=>v));
  
  const today=new Date();
  function calcDays(d){try{if(!d)return null;const dt=new Date(d);return isNaN(dt)?null:Math.round((dt-today)/86400000);}catch{return null;}}
  function status(d){if(d===null)return'بدون';if(d<=0)return'منتهية';if(d<=30)return'تنتهي_30';if(d<=60)return'تنتهي_60';if(d<=90)return'تنتهي_90';return'سارية';}
  
  if(parsed.length>0) {
    RAW = parsed.map((r,i)=>{
      const endDays=calcDays(g(r,'نهاية العقد'));const dueDays=calcDays(g(r,'ميعاد اللإستحقاق القادم (ميلادى)','ميعاد الاستحقاق القادم'));
      return {no:i+1,contract:g(r,'العقد'),extra:g(r,'بنود إضافية'),sector:g(r,'القطاع'),landlord:g(r,'اسم المؤجر'),tenant:g(r,'اسم المستأجر'),contractNotes:g(r,'ملاحظات العقد'),rep:g(r,'ممثل المستأجر'),annualValue:parseFloat(g(r,'القيمة الإيجارية السنوية'))||0,duration:g(r,'مدة العقد  ','مدة العقد'),startDate:g(r,'بداية العقد ','بداية العقد'),endDate:g(r,'نهاية العقد'),endDays,endStatus:status(endDays),taxBurden:g(r,'تحمل الضريبة'),payMethod:g(r,'طرق الدفع ','طرق الدفع'),dueDate:g(r,'ميعاد اللإستحقاق القادم (ميلادى)','ميعاد الاستحقاق القادم'),dueDays,dueStatus:status(dueDays),dueAmount:parseFloat(g(r,'مبلغ الإستحقاق','مبلغ الاستحقاق'))||0,notes:g(r,'ملاحظات ','ملاحظات'),notes2:g(r,'ملاحظات 2')};
    });
    renderKPIs();renderAlerts();renderCharts();render();
  }
}

function exportExcel() {
  if(typeof XLSX==='undefined') return;
  const wb=XLSX.utils.book_new();
  const hdrs=['#','العقد','بنود إضافية','القطاع','المؤجر','المستأجر','ملاحظات العقد','الممثل','القيمة السنوية','مدة العقد','بداية العقد','نهاية العقد','أيام المتبقية','حالة العقد','تحمل الضريبة','طريقة الدفع','موعد الاستحقاق','أيام الاستحقاق','حالة الاستحقاق','مبلغ الاستحقاق','ملاحظات','ملاحظات 2'];
  const d=[hdrs,...RAW.map(r=>[r.no,r.contract,r.extra,r.sector,r.landlord,r.tenant,r.contractNotes,r.rep,r.annualValue,r.duration,r.startDate,r.endDate,r.endDays,r.endStatus,r.taxBurden,r.payMethod,r.dueDate,r.dueDays,r.dueStatus,r.dueAmount,r.notes,r.notes2])];
  const ws=XLSX.utils.aoa_to_sheet(d);
  ws['!cols']=hdrs.map(()=>({wch:16}));
  XLSX.utils.book_append_sheet(wb,ws,'عقود الإيجار');
  XLSX.writeFile(wb,'عقود_الإيجار_'+new Date().toISOString().split('T')[0]+'.xlsx');
}

function toggleDark() {
  dark=!dark;
  if(dark){document.documentElement.setAttribute('data-dark','1');}else{document.documentElement.removeAttribute('data-dark');}
  document.getElementById('darkBtn').textContent=dark?'☀️':'🌙';
}
